<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAPTCHA das Fases · 20 Níveis de Semáforos</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #1f3b2c, #0a1f1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }

        /* container principal */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: #fef0cf;
            border-radius: 72px;
            padding: 20px 20px 30px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 255, 200, 0.8);
            transition: 0.2s;
        }

        /* cabeçalho meta-humor */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.9rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(135deg, #3b5e2b, #d6a13e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0 #fff6cf;
            letter-spacing: -1px;
        }
        .sub {
            font-size: 0.8rem;
            background: #2b2b1f;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 60px;
            color: #fff0aa;
            margin-top: 5px;
        }

        /* info da fase */
        .phase-info {
            background: #293241;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            color: #f9e0a0;
            font-weight: bold;
            box-shadow: inset 0 1px 3px #5f6c8a, 0 6px 0 #141824;
        }
        .phase-badge {
            background: #f4c542;
            padding: 5px 18px;
            border-radius: 32px;
            color: #2c2b1a;
            font-size: 1.4rem;
        }
        .lights-progress {
            background: #1f2538;
            border-radius: 30px;
            padding: 5px 14px;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .error-counter {
            background: #623b2a;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.9rem;
        }

        /* grade dos captchas (imagens emoji) */
        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .captcha-card {
            background: #fff7e8;
            border-radius: 36px;
            padding: 20px 8px;
            text-align: center;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 8px 0 #b2946b;
            border: 2px solid #ffe2a4;
            transform: translateY(-2px);
        }
        .captcha-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b2946b;
        }
        /* semáforo já clicado */
        .captcha-card.light-clicked {
            background: #a7d489;
            box-shadow: 0 3px 0 #508d2c;
            transform: translateY(3px);
            filter: grayscale(0.1);
            cursor: default;
            opacity: 0.75;
        }
        /* erro (shake) */
        .captcha-card.wrong-pulse {
            animation: shakeRobot 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            background: #ffbc9b;
        }
        @keyframes shakeRobot {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-6px) rotate(-1deg);}
            75% { transform: translateX(6px) rotate(1deg);}
            100% { transform: translateX(0); }
        }

        .message-area {
            background: #f7e5c2;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 15px 0 10px;
            color: #cc6b2c;
            border-left: 8px solid #e09d32;
            font-family: monospace;
        }

        .reset-btn {
            background: #c0713b;
            width: 100%;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-family: monospace;
            box-shadow: 0 5px 0 #69371c;
            cursor: pointer;
            transition: 0.05s linear;
            margin-top: 8px;
        }
        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #69371c;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 20px;
            color: #5f4c2b;
        }

        @media (max-width: 500px) {
            .captcha-card { font-size: 2.4rem; padding: 14px 4px; }
            .phase-badge { font-size: 1rem; }
            .lights-progress { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>🚦 CAPTCHA INFINITO 🚥</h1>
        <div class="sub">〣 20 fases · clique nos semáforos 〣</div>
    </div>

    <div class="phase-info">
        <span class="phase-badge" id="phaseNumberDisplay">FASE 1 / 20</span>
        <span class="lights-progress" id="lightsCounter">🚦 0 / 3</span>
        <span class="error-counter" id="errorCountDisplay">🤖 erros: 0</span>
    </div>

    <div id="captchaGrid" class="captcha-grid"></div>

    <div id="gameMessage" class="message-area">
        🌟 Clique em TODOS os semáforos (🚦 ou 🚥). Avance 20 fases e recomece com POSIÇÕES DIFERENTES!
    </div>

    <button id="resetGameBtn" class="reset-btn">🔄 REINICIAR VOLTA À FASE 1 (nova posição)</button>
    <footer>🤡 meta-humor: cada ciclo as imagens dançam • 20 fases • volte à primeira com layout embaralhado</footer>
</div>

<script>
    // ======================== CONFIGURAÇÃO DO JOGO ========================
    // Lista de ícones DISTRATORES (imagens que NÃO são semáforos)
    const DISTRACTORS = [
        "🚗", "🚕", "🚙", "🚌", "🚲", "🛵", "🚶", "🐕", "🐈", "📱", "💻", "🖨️", 
        "🚛", "✈️", "⛵", "🏍️", "🚨", "🛑", "🚧", "🧩", "🤖", "👾", "📦", "🌵", "🍕"
    ];
    
    // Ícones válidos de semáforo
    const TRAFFIC_LIGHTS = ["🚦", "🚥"];
    
    // Quantidade fixa de semáforos por fase (número de itens corretos)
    const LIGHTS_PER_PHASE = 3;
    const TOTAL_ITEMS_IN_GRID = 9;   // grade 3x3
    
    // Variáveis globais do jogo
    let currentPhase = 1;            // 1..20
    let currentItems = [];            // array de objetos { emoji, isLight, clicked }
    let lightsClickedInPhase = 0;
    let totalLightsInPhase = LIGHTS_PER_PHASE;
    let errorCount = 0;               // contador de cliques errados (só por humor)
    
    // Elementos DOM
    const gridContainer = document.getElementById("captchaGrid");
    const phaseNumberSpan = document.getElementById("phaseNumberDisplay");
    const lightsCounterSpan = document.getElementById("lightsCounter");
    const errorCountSpan = document.getElementById("errorCountDisplay");
    const gameMessageDiv = document.getElementById("gameMessage");
    const resetBtn = document.getElementById("resetGameBtn");
    
    // ---------- FUNÇÃO AUXILIAR: EMBARALHAR (FISHER-YATES) ----------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // ---------- GERAR UMA FASE (COM POSIÇÕES ALEATÓRIAS) ----------
    // Garante exatamente LIGHTS_PER_PHASE semáforos e o restante distratores
    // depois embaralha a ordem -> "diferença de posição" a cada chamada
    function generatePhaseItems() {
        const items = [];
        // 1) adicionar semáforos
        for (let i = 0; i < LIGHTS_PER_PHASE; i++) {
            // alterna entre os dois tipos de semáforo para variedade
            const lightEmoji = TRAFFIC_LIGHTS[i % TRAFFIC_LIGHTS.length];
            items.push({
                emoji: lightEmoji,
                isLight: true,
                clicked: false
            });
        }
        // 2) adicionar distratores (total de itens - semáforos)
        const distractorsNeeded = TOTAL_ITEMS_IN_GRID - LIGHTS_PER_PHASE;
        for (let i = 0; i < distractorsNeeded; i++) {
            const randomDistractor = DISTRACTORS[Math.floor(Math.random() * DISTRACTORS.length)];
            items.push({
                emoji: randomDistractor,
                isLight: false,
                clicked: false
            });
        }
        // 3) EMBARALHAR TOTALMENTE -> garante "diferença de posição" a cada fase / reinício
        return shuffleArray(items);
    }
    
    // ---------- ATUALIZAR INTERFACE (RENDERIZAR GRADE) ----------
    function renderGrid() {
        gridContainer.innerHTML = "";
        for (let idx = 0; idx < currentItems.length; idx++) {
            const item = currentItems[idx];
            const card = document.createElement("div");
            card.className = "captcha-card";
            if (item.isLight && item.clicked) {
                card.classList.add("light-clicked");
            }
            // exibe o emoji + microtexto (brincadeira)
            card.innerHTML = `<div style="font-size: 3rem; line-height:1.2;">${item.emoji}</div>
                              <div style="font-size: 0.65rem; opacity:0.7;">${item.isLight ? "🚦 semáforo" : "❌ distrator"}</div>`;
            card.addEventListener("click", (e) => {
                e.stopPropagation();
                handleCardClick(idx);
            });
            gridContainer.appendChild(card);
        }
        // atualiza contadores de luzes e fase
        lightsCounterSpan.innerHTML = `🚥 ${lightsClickedInPhase} / ${totalLightsInPhase}`;
        phaseNumberSpan.innerHTML = `FASE ${currentPhase} / 20`;
        errorCountSpan.innerHTML = `🤖 erros: ${errorCount}`;
    }
    
    // ---------- MENSAGEM COM HUMOR ----------
    function setMessage(text, isError = false) {
        gameMessageDiv.innerHTML = isError ? `⚠️ ${text} ⚠️` : `✨ ${text}`;
        if (!isError) {
            setTimeout(() => {
                if (gameMessageDiv.innerHTML.includes(text))
                    gameMessageDiv.innerHTML = "🧠 clique nos semáforos! cada fase embaralha posições.";
            }, 2000);
        } else {
            // mensagem de erro some após 1.5s, mas mantém dica
            setTimeout(() => {
                if (gameMessageDiv.innerHTML.includes("⚠️"))
                    gameMessageDiv.innerHTML = "💡 Dica: só os semáforos (🚦 ou 🚥) valem. Avance 20 fases!";
            }, 1500);
        }
    }
    
    // ---------- AVANÇAR PARA PRÓXIMA FASE (OU CICLO COMPLETO) ----------
    function advanceToNextPhase() {
        if (currentPhase < 20) {
            currentPhase++;
            // gera nova fase com novos itens e posições aleatórias
            loadPhase(currentPhase);
            setMessage(`✅ FASE ${currentPhase}! Novos semáforos apareceram em posições diferentes.`);
        } 
        else if (currentPhase === 20) {
            // COMPLETOU CICLO DE 20 FASES: volta para fase 1 com nova disposição
            setMessage("🎉 PARABÉNS! Você completou 20 fases! Voltando à FASE 1 com posições TROCADAS! 🎉");
            currentPhase = 1;
            // gera fase 1 com layout totalmente novo (diferença de posição)
            loadPhase(currentPhase);
            // mensagem extra
            setTimeout(() => {
                setMessage("🌀 FASE 1 RENOVADA: todos os ícones mudaram de lugar! Recomece o ciclo.");
            }, 800);
        }
    }
    
    // ---------- CARREGAR UMA FASE ESPECÍFICA (GERA NOVO GRID) ----------
    function loadPhase(phaseNumber) {
        // gera novos itens (garantindo 3 semáforos, posições aleatórias)
        currentItems = generatePhaseItems();
        // reset dos contadores de clique desta fase
        lightsClickedInPhase = 0;
        totalLightsInPhase = LIGHTS_PER_PHASE;
        // garantir que todos os itens têm clicked = false (já foi setado na geração)
        for (let i = 0; i < currentItems.length; i++) {
            currentItems[i].clicked = false;
        }
        // renderiza
        renderGrid();
        // mensagem especial se fase 1 com reinício
        if (phaseNumber === 1 && window._cycleResetJustHappened) {
            // flag opcional
        }
        window._cycleResetJustHappened = false;
    }
    
    // ---------- TRATAR CLIQUE NOS CARDS ----------
    function handleCardClick(clickedIndex) {
        const item = currentItems[clickedIndex];
        
        // Se já clicou num semáforo correto e já está marcado, ignorar (não pode clicar de novo)
        if (item.isLight && item.clicked) {
            setMessage("Você já clicou nesse semáforo! Avance clicando nos outros.", false);
            return;
        }
        
        // Caso seja SEMÁFORO NÃO CLICADO AINDA
        if (item.isLight && !item.clicked) {
            // ACERTOU!
            item.clicked = true;
            lightsClickedInPhase++;
            
            // Atualiza visual do card
            renderGrid();  // re-renderiza com a classe light-clicked no card correspondente
            
            // Verifica se completou todos os semáforos da fase
            if (lightsClickedInPhase === totalLightsInPhase) {
                // FASE COMPLETA!
                setMessage(`🏆 FASE ${currentPhase} CONCLUÍDA! Avançando... 🏆`);
                // Avança para próxima fase após pequeno delay (feedback)
                setTimeout(() => {
                    advanceToNextPhase();
                }, 500);
            } else {
                setMessage(`✔️ Semáforo confirmado! Faltam ${totalLightsInPhase - lightsClickedInPhase} semáforo(s).`, false);
            }
        } 
        else {
            // CLIQUE EM DISTRATOR (ERRO)
            errorCount++;
            errorCountSpan.innerHTML = `🤖 erros: ${errorCount}`;
            // adiciona efeito de tremor no card clicado errado
            const cards = document.querySelectorAll(".captcha-card");
            if (cards[clickedIndex]) {
                cards[clickedIndex].classList.add("wrong-pulse");
                setTimeout(() => {
                    cards[clickedIndex].classList.remove("wrong-pulse");
                }, 300);
            }
            // mensagem meta-humor
            const wrongEmoji = item.emoji;
            setMessage(`"${wrongEmoji}" NÃO é um semáforo! Robôs confundem. Tente novamente.`, true);
        }
        
        // atualiza contador de luzes na interface (já no renderGrid, mas por segurança chama novamente)
        lightsCounterSpan.innerHTML = `🚥 ${lightsClickedInPhase} / ${totalLightsInPhase}`;
    }
    
    // ---------- RESET TOTAL DO JOGO (volta à fase 1, mas com posições DIFERENTES) ----------
    function fullResetGame() {
        // zera contador de erros (humor)
        errorCount = 0;
        currentPhase = 1;
        // força geração de nova fase 1 com shuffle completo (posições sempre diferentes)
        currentItems = generatePhaseItems();
        lightsClickedInPhase = 0;
        totalLightsInPhase = LIGHTS_PER_PHASE;
        // garantir flags clicked = false
        for (let i = 0; i < currentItems.length; i++) {
            currentItems[i].clicked = false;
        }
        renderGrid();
        errorCountSpan.innerHTML = `🤖 erros: 0`;
        setMessage("🔄 JOGO REINICIADO! FASE 1 com nova disposição de ícones. Clique nos semáforos! 🔄");
        // pequena dica visual
    }
    
    // ---------- INICIALIZAÇÃO DO JOGO ----------
    function initGame() {
        // gera primeira fase com posição aleatória (diferença garantida)
        currentItems = generatePhaseItems();
        lightsClickedInPhase = 0;
        totalLightsInPhase = LIGHTS_PER_PHASE;
        currentPhase = 1;
        errorCount = 0;
        renderGrid();
        errorCountSpan.innerHTML = `🤖 erros: 0`;
        setMessage("🚦 20 fases de CAPTCHA! Clique nos semáforos. Ao chegar na fase 20, volta pra 1 com posições novas!");
    }
    
    // evento do botão reset
    resetBtn.addEventListener("click", () => {
        fullResetGame();
    });
    
    // Inicia o jogo
    initGame();
</script>
</body>
  </html>
